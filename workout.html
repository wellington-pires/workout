<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App de Treino - Wellington</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f8fafc; --accent: #3b82f6; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; padding-bottom: 150px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent); font-size: 1.8rem; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; font-size: 0.9rem; }
        .day-selector { width: 100%; padding: 12px; background-color: var(--card-bg); color: var(--text-color); border: 2px solid var(--accent); border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; outline: none; }
        #workout-container { display: flex; flex-direction: column; gap: 15px; }
        .exercise-card { background-color: var(--card-bg); border-radius: 10px; padding: 15px; border-left: 4px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .exercise-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1em; margin-bottom: 8px; color: #f8fafc; }
        .sets-reps { color: var(--accent); font-weight: bold; }
        .details { font-size: 0.85em; color: #94a3b8; margin-bottom: 12px; line-height: 1.4; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background-color: #0f172a; color: white; text-align: center; font-size: 1rem; }
        .timer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--card-bg); padding: 12px 15px; display: flex; flex-direction: column; align-items: center; border-top: 2px solid var(--accent); z-index: 1000; }
        .timer-display { font-size: 2.2rem; font-weight: bold; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        .timer-controls { display: flex; gap: 8px; width: 100%; justify-content: space-between; margin-bottom: 8px; }
        .timer-controls-bottom { display: flex; gap: 8px; width: 100%; }
        button { padding: 10px 5px; border: none; border-radius: 6px; background-color: #334155; color: white; font-weight: bold; cursor: pointer; flex: 1; font-size: 0.9rem; }
        .btn-start { background-color: var(--success); font-size: 1rem; padding: 12px; }
        .btn-stop { background-color: var(--danger); font-size: 1rem; padding: 12px; }
        .timer-active { color: var(--success); }
        .timer-done { color: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <header>
        <h1>Treino Wellington</h1>
        <p class="subtitle">Protocolo 6 Dias - Cutting & Lombar Safe</p>
    </header>
    <select class="day-selector" id="day-selector">
        <option value="0">SEG: PUSH A (Peito/Ombro/Tríceps)</option>
        <option value="1">TER: PULL A (Costas/Bíceps)</option>
        <option value="2">QUA: LEGS A (Quadríceps/Panturrilha)</option>
        <option value="3">QUI: PUSH B (Peito/Ombro/Tríceps)</option>
        <option value="4">SEX: PULL B (Costas/Bíceps)</option>
        <option value="5">SÁB: LEGS B (Posterior/Glúteo/Panturrilha)</option>
    </select>
    <div id="workout-container"></div>
    <div class="timer-bar">
        <div class="timer-display" id="time-display">00:00</div>
        <div class="timer-controls">
            <button onclick="setTimer(60)">60s</button>
            <button onclick="setTimer(90)">90s</button>
            <input type="number" id="custom-time-input" placeholder="Segs" style="width: 60px; text-align: center; border-radius: 6px;">
            <button onclick="setCustomTimer()">OK</button>
        </div>
        <div class="timer-controls-bottom">
            <button class="btn-start" onclick="startTimer()">▶ Play</button>
            <button class="btn-stop" onclick="stopTimer()">■ Stop</button>
        </div>
    </div>
    <script>
        const workouts = [
            [{name: "Supino Inclinado Halter", reps: "4x 8-10"}, {name: "Supino Reto Máquina", reps: "3x 10-12"}, {name: "Crossover Polia", reps: "3x 12-15"}, {name: "Desenv. Máquina", reps: "3x 10"}, {name: "Elevação Lateral", reps: "4x 15"}, {name: "Tríceps Corda", reps: "3x 12"}],
            [{name: "Puxada Aberta", reps: "4x 10-12"}, {name: "Remada Máquina Articulada", reps: "4x 10"}, {name: "Pulldown Corda", reps: "3x 15"}, {name: "Rosca Scott Máquina", reps: "3x 12"}, {name: "Rosca Martelo Sentado", reps: "3x 12"}],
            [{name: "Leg Press 45°", reps: "4x 10-12"}, {name: "Cadeira Extensora", reps: "4x 15"}, {name: "Cadeira Abdutora", reps: "3x 12"}, {name: "Panturrilha Leg Press", reps: "4x 15"}],
            [{name: "Supino Inclinado Máquina", reps: "4x 10"}, {name: "Crucifixo Máquina", reps: "3x 12-15"}, {name: "Elevação Lateral Unilateral", reps: "4x 15"}, {name: "Tríceps Francês Polia", reps: "3x 12"}, {name: "Tríceps Testa Máquina", reps: "3x 12"}],
            [{name: "Remada Baixa Triângulo", reps: "4x 10-12"}, {name: "Remada Unilateral Máquina", reps: "3x 12"}, {name: "Face Pull", reps: "3x 15"}, {name: "Rosca Direta Polia", reps: "3x 12"}, {name: "Rosca Concentrada", reps: "3x 12"}],
            [{name: "Leg Press Horizontal", reps: "4x 10-12"}, {name: "Cadeira Flexora", reps: "4x 12"}, {name: "Stiff Polia (Cordas entre pernas)", reps: "3x 12"}, {name: "Panturrilha Sentado", reps: "4x 15"}]
        ];
        // [Funções renderWorkout, setTimer, startTimer, etc. idênticas ao anterior...]
        function renderWorkout() { const container = document.getElementById("workout-container"); const day = document.getElementById("day-selector").value; container.innerHTML = workouts[day].map((ex, i) => `<div class="exercise-card"><div class="exercise-header"><span>${i + 1}. ${ex.name}</span><span class="sets-reps">${ex.reps}</span></div><div class="input-group"><input type="number" placeholder="Kg"><input type="number" placeholder="Reps"></div></div>`).join(''); }
        function updateDisplay(s) { document.getElementById('time-display').textContent = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
        function setTimer(s) { clearInterval(countdown); timeLeft = s; updateDisplay(s); }
        function setCustomTimer() { const s = document.getElementById('custom-time-input').value; if(s) setTimer(parseInt(s)); }
        let countdown; let timeLeft = 0;
        function startTimer() { clearInterval(countdown); countdown = setInterval(() => { timeLeft--; updateDisplay(timeLeft); if(timeLeft <= 0) { clearInterval(countdown); if(navigator.vibrate) navigator.vibrate(500); } }, 1000); }
        function stopTimer() { clearInterval(countdown); }
        document.addEventListener('DOMContentLoaded', () => { renderWorkout(); document.getElementById("day-selector").addEventListener("change", renderWorkout); });
    </script>
</body>
</html>
